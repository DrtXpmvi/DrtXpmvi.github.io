<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Full Metadata Remover</title>
  <style>
    :root {
      --bg: #f9f9f9;
      --fg: #333;
      --accent: #007bff;
      --secondary: #28a745;
      --card-bg: #fff;
    }
    [data-theme="dark"] {
      --bg: #222;
      --fg: #eee;
      --accent: #4ea8ff;
      --secondary: #5cd65c;
      --card-bg: #333;
    }
    body {
      background: var(--bg);
      color: var(--fg);
      margin:0;
      display:flex; justify-content:center; align-items:center;
      height:100vh;
      font-family:Arial,sans-serif;
      transition: background 0.3s, color 0.3s;
    }
    .container {
      background: var(--card-bg);
      padding:2em; border-radius:10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      width:90%; max-width:700px;
    }
    h1 { margin-top:0; }
    #dropZone {
      border:2px dashed var(--accent);
      padding:2em;
      margin-bottom:1em;
      border-radius:10px;
      background:rgba(0,123,255,0.05);
      color:var(--accent);
      text-align:center;
      transition:background 0.2s;
    }
    #dropZone.dragover {
      background:rgba(0,123,255,0.15);
    }
    input[type=file] { display:none; }
    label.file-btn, button, select, input[type=range] {
      display:inline-block;
      margin:0.5em 0;
      padding:0.5em 1em;
      border:none;
      border-radius:5px;
      cursor:pointer;
      background:var(--accent);
      color:white;
    }
    button:disabled {
      background:#aaa; cursor:not-allowed;
    }
    .controls {
      display:flex;
      align-items:center;
      gap:1em;
      flex-wrap:wrap;
      justify-content:center;
      margin-bottom:1em;
    }
    #downloadArea { margin-top:1em; }
    .download-link {
      display:block;
      margin:0.5em 0;
      color:var(--secondary);
      font-weight:bold;
      text-decoration:none;
    }
    a#zipLink { font-size:1.1em; color:var(--fg); text-decoration:none; margin-top:1em; display:block;}
    .preview {
      display:flex;
      gap:1em;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:1em;
    }
    .preview img {
      max-width:150px;
      max-height:150px;
      object-fit:cover;
      border:2px solid var(--accent);
      border-radius:5px;
    }
    .toggle {
      cursor:pointer;
      font-size:1em;
      color:var(--accent);
      background:none;
    }
    canvas { display:none; }

    /* Progress Bar */
    .progress-container {
      margin-top: 1em;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
      height: 20px;
    }
    .progress-bar {
      width: 0%;
      height: 100%;
      background-color: var(--secondary);
      transition: width 0.3s ease;
    }
  </style>
</head>
<body data-theme="light">
  <div class="container">
    <h1>🧼 Metadata Remover</h1>

    <button class="toggle" id="modeToggle">🌙 Dark Mode</button>

    <div id="dropZone">Drag & Drop Images Here</div>
    <div class="controls">
      <label class="file-btn" for="fileInput">Or Select Images</label>
      <input type="file" id="fileInput" multiple accept="image/*" />
      <select id="formatSelect">
        <option value="png">PNG (lossless)</option>
        <option value="jpeg">JPEG (lossy)</option>
      </select>
      <label>Quality:
        <input type="range" id="qualityRange" min="0.1" max="1" step="0.1" value="0.9" />
      </label>

      <button id="cleanButton" disabled>Clean All Images</button>
    </div>

    <div class="preview" id="previewArea"></div>

    <div class="progress-container" id="progressContainer" style="display:none;">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="downloadArea"></div>
    <a id="zipLink" style="display:none;" download="cleaned-images.zip">⬇️ Download All as ZIP</a>
    <canvas id="canvas"></canvas>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const cleanButton = document.getElementById('cleanButton');
    const previewArea = document.getElementById('previewArea');
    const downloadArea = document.getElementById('downloadArea');
    const zipLink = document.getElementById('zipLink');
    const formatSelect = document.getElementById('formatSelect');
    const qualityRange = document.getElementById('qualityRange');
    const modeToggle = document.getElementById('modeToggle');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');

    let files = [];

    // Dark mode toggle
    modeToggle.addEventListener('click', () => {
      const theme = document.body.getAttribute('data-theme');
      document.body.setAttribute('data-theme', theme === 'light' ? 'dark' : 'light');
      modeToggle.textContent = theme === 'light' ? '☀️ Light Mode' : '🌙 Dark Mode';
    });

    [dropZone, document].forEach(el => {
      el.addEventListener('dragover', e => {
        if (e.target === dropZone) {
          e.preventDefault(); dropZone.classList.add('dragover');
        }
      });
      el.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    });

    dropZone.addEventListener('drop', e => {
      e.preventDefault(); dropZone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', e => handleFiles(e.target.files));

    function handleFiles(fileList) {
      files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
      if (!files.length) return alert('No valid images selected.');
      cleanButton.disabled = false;
      previewArea.innerHTML = downloadArea.innerHTML = '';
      zipLink.style.display = 'none';
      showPreviews();
    }

    function showPreviews() {
      previewArea.innerHTML = '';
      files.forEach(f => {
        const url = URL.createObjectURL(f);
        const img = document.createElement('img');
        img.src = url;
        img.title = `Original: ${f.name}`;
        previewArea.appendChild(img);
      });
    }

    cleanButton.addEventListener('click', () => {
      cleanButton.disabled = true;
      downloadArea.innerHTML = '';
      zipLink.style.display = 'none';
      progressContainer.style.display = 'block';
      progressBar.style.width = '0%';

      const zip = new JSZip();
      let done = 0;

      files.forEach((f, i) => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            canvas.toBlob(blob => {
              const fn = `cleaned-${i+1}-${f.name.replace(/\s/g,'_')}.${formatSelect.value}`;
              blob.arrayBuffer().then(buf => {
                zip.file(fn, buf);
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fn;
                a.textContent = `⬇️ ${fn}`;
                a.className = 'download-link';
                downloadArea.appendChild(a);

                done++;
                const percent = Math.round((done / files.length) * 100);
                progressBar.style.width = percent + '%';

                if (done === files.length) {
                  zip.generateAsync({type:'blob'}).then(content => {
                    zipLink.href = URL.createObjectURL(content);
                    zipLink.style.display = 'block';
                    progressContainer.style.display = 'none';
                  });
                }
              });
            }, formatSelect.value, formatSelect.value === 'jpeg' ? +qualityRange.value : 1);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(f);
      });
    });
  </script>
</body>
</html>
