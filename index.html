<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caesar Cipher Encoder/Decoder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 600px;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    textarea, input[type="number"], select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      resize: vertical;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    button {
      background-color: #007BFF;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      margin-top: 10px;
    }

    button:hover {
      background-color: #0056b3;
    }

    .output {
      margin-top: 20px;
      padding: 15px;
      background: #e9ecef;
      border-radius: 5px;
      min-height: 50px;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Caesar Cipher</h1>

    <label for="mode">Mode</label>
    <select id="mode">
      <option value="encode">Encode</option>
      <option value="decode">Decode</option>
    </select>

    <label for="shift">Shift Amount</label>
    <input type="number" id="shift" value="3" min="1" max="25" />

    <label for="inputText">Enter Text</label>
    <textarea id="inputText" rows="5" placeholder="Type your message..."></textarea>

    <div class="output" id="result"></div>

    <div class="button-group">
      <button onclick="copyToClipboard()">📋 Copy to Clipboard</button>
      <button onclick="downloadText()">💾 Download as Text</button>
      <button onclick="openGitHub()">🐙 Find me on GitHub</button>
    </div>
  </div>

  <script>
    function caesarCipher(str, shift, mode = "encode") {
      return str.split('').map(char => {
        const isUpper = char >= 'A' && char <= 'Z';
        const isLower = char >= 'a' && char <= 'z';

        if (!isUpper && !isLower) return char;

        const base = isUpper ? 65 : 97;
        const offset = mode === "decode" ? (26 - shift) : shift;

        return String.fromCharCode((char.charCodeAt(0) - base + offset) % 26 + base);
      }).join('');
    }

    function updatePreview() {
      const mode = document.getElementById('mode').value;
      const shift = parseInt(document.getElementById('shift').value) || 0;
      const text = document.getElementById('inputText').value;

      const result = text.trim()
        ? caesarCipher(text, shift, mode)
        : "Please enter some text!";
        
      document.getElementById('result').textContent = result;
    }

    function copyToClipboard() {
      const resultText = document.getElementById('result').textContent;
      if (!resultText || resultText === "Please enter some text!") return alert("Nothing to copy!");

      navigator.clipboard.writeText(resultText)
        .then(() => alert("Copied to clipboard!"))
        .catch(() => alert("Failed to copy!"));
    }

    function downloadText() {
      const resultText = document.getElementById('result').textContent;
      if (!resultText || resultText === "Please enter some text!") return alert("Nothing to download!");

      const blob = new Blob([resultText], { type: "text/plain" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "caesar_output.txt";
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function openGitHub() {
      window.open("https://github.com/PlayzDev", "_blank");
    }

    document.getElementById('inputText').addEventListener('input', updatePreview);
    document.getElementById('shift').addEventListener('input', updatePreview);
    document.getElementById('mode').addEventListener('change', updatePreview);

    updatePreview();
  </script>
</body>
</html>
